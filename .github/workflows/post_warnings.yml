
name: KNMI waarschuwingen

on:
  schedule:
    - cron: "*/10 * * * *"  # elke 10 minuten
  workflow_dispatch:        # handmatig starten

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install logging os sys requests json asyncio discord

      - name: Run script
        env:
          KNMI_API_KEY: ${{ secrets.KNMI_API_KEY }}
          DISCORD_WARNING_BOT: ${{ secrets.DISCORD_WARNING_BOT }}
          DISCORD_WARNING_CHANNEL: ${{ secrets.DISCORD_WARNING_CHANNEL }}
        run: python "Python code's/knmi_warnings.py"

      - name: Commit state (last_file.txt)
        run:
          git config user.name "${{ github.actor }}"
          git config user.email  "${{ github.actor }}@users.noreply.github.com"
          git add last_file.txt
          git commit -m "Update last processed file" || echo "No changes"
          git push
